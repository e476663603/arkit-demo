<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WebAR 图像锚点</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Landing page */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    .landing::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(0, 212, 170, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .landing-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00d4aa, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 36px;
      background: linear-gradient(135deg, #00d4aa, #3b82f6);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 32px rgba(0, 212, 170, 0.3);
      margin-bottom: 28px;
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(0, 212, 170, 0.4);
    }

    .start-btn:active {
      transform: scale(0.97);
    }

    .start-btn svg {
      width: 22px;
      height: 22px;
    }

    .ref-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }

    .ref-card h3 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #00d4aa;
      margin-bottom: 12px;
    }

    .ref-card .img-wrap {
      text-align: center;
      margin-bottom: 12px;
    }

    .ref-card img {
      max-width: 240px;
      width: 100%;
      border-radius: 8px;
      border: 2px solid rgba(0, 212, 170, 0.3);
    }

    .ref-card .download {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(0, 212, 170, 0.15);
      border: 1px solid rgba(0, 212, 170, 0.3);
      border-radius: 8px;
      color: #00d4aa;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .ref-card .download:hover {
      background: rgba(0, 212, 170, 0.25);
    }

    .steps {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
      text-align: left;
    }

    .steps h3 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #3b82f6;
      margin-bottom: 14px;
    }

    .steps ol {
      list-style: none;
      counter-reset: step;
    }

    .steps li {
      counter-increment: step;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.7);
      margin-bottom: 10px;
    }

    .steps li::before {
      content: counter(step);
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #3b82f6;
      margin-top: 1px;
    }

    .tech-badge {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }

    /* AR scene */
    #ar-scene {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
    }

    .ar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1001;
      padding: env(safe-area-inset-top, 12px) 16px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .ar-overlay > * {
      pointer-events: auto;
    }

    .ar-status {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ar-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00d4aa;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .close-ar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .ar-hint {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom, 20px), 20px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      padding: 10px 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
      transition: opacity 0.3s;
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 212, 170, 0.2);
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading AR Engine...</div>
  </div>

  <!-- Landing page -->
  <div class="landing" id="landing">
    <div class="landing-content">
      <div class="logo">📷</div>
      <h1 class="title">WebAR 图像锚点</h1>
      <p class="subtitle">扫描识别图，3D 模型即刻锚定在空间中<br>基于 MindAR.js + A-Frame，无需下载 App</p>

      <button class="start-btn" id="startAR" onclick="startAR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        启动 AR
      </button>

      <div class="ref-card">
        <h3>识别图</h3>
        <div class="img-wrap">
          <img src="assets/card.png" alt="AR Reference Image">
        </div>
        <a class="download" href="assets/card.png" download="ar-reference.png">下载识别图</a>
      </div>

      <div class="steps">
        <h3>使用步骤</h3>
        <ol>
          <li>下载识别图并打印（或在另一屏幕显示）</li>
          <li>点击上方「启动 AR」按钮</li>
          <li>允许摄像头权限</li>
          <li>将摄像头对准识别图</li>
          <li>3D 模型将锚定在识别图位置</li>
        </ol>
      </div>

      <div class="tech-badge">MindAR.js · A-Frame · WebGL · Image Tracking</div>
    </div>
  </div>

  <!-- AR Scene -->
  <div id="ar-scene">
    <div class="ar-overlay">
      <div class="ar-status">
        <span class="dot"></span>
        <span id="ar-status-text">扫描识别图中...</span>
      </div>
      <button class="close-ar" onclick="stopAR()">✕</button>
    </div>
    <div class="ar-hint" id="ar-hint">请将摄像头对准识别图</div>
  </div>

  <!-- MindAR + A-Frame scripts -->
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    let arScene = null;
    let foundTarget = false;

    function startAR() {
      document.getElementById('landing').style.display = 'none';
      document.getElementById('ar-scene').style.display = 'block';
      
      // Create A-Frame scene dynamically
      const scene = document.createElement('a-scene');
      scene.setAttribute('mindar-image', 'imageTargetSrc: assets/card.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no');
      scene.setAttribute('color-space', 'sRGB');
      scene.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
      scene.setAttribute('vr-mode-ui', 'enabled: false');
      scene.setAttribute('device-orientation-permission-ui', 'enabled: false');
      scene.id = 'aframe-scene';
      
      // Assets
      const assets = document.createElement('a-assets');
      const modelItem = document.createElement('a-asset-item');
      modelItem.id = 'arModel';
      modelItem.setAttribute('src', 'assets/model.glb');
      assets.appendChild(modelItem);
      scene.appendChild(assets);

      // Camera
      const camera = document.createElement('a-camera');
      camera.setAttribute('position', '0 0 0');
      camera.setAttribute('look-controls', 'enabled: false');
      scene.appendChild(camera);

      // Image target entity
      const target = document.createElement('a-entity');
      target.setAttribute('mindar-image-target', 'targetIndex: 0');
      
      // 3D model anchored to image
      const model = document.createElement('a-gltf-model');
      model.setAttribute('src', '#arModel');
      model.setAttribute('position', '0 0 0');
      model.setAttribute('rotation', '-90 0 0');
      model.setAttribute('scale', '0.5 0.5 0.5');
      model.setAttribute('animation', 'property: position; from: 0 -0.2 0; to: 0 0.1 0; dur: 2000; easing: easeInOutQuad; loop: true; dir: alternate');
      target.appendChild(model);

      // Scan line effect
      const scanLine = document.createElement('a-plane');
      scanLine.setAttribute('color', '#00d4aa');
      scanLine.setAttribute('opacity', '0.3');
      scanLine.setAttribute('width', '1');
      scanLine.setAttribute('height', '0.01');
      scanLine.setAttribute('position', '0 0 0.01');
      scanLine.setAttribute('animation', 'property: position; from: -0.3 0 0.01; to: 0.3 0 0.01; dur: 1500; easing: easeInOutQuad; loop: true; dir: alternate');
      target.appendChild(scanLine);

      scene.appendChild(target);
      document.getElementById('ar-scene').appendChild(scene);
      
      arScene = scene;

      // Listen for target found/lost
      scene.addEventListener('targetFound', () => {
        foundTarget = true;
        document.getElementById('ar-status-text').textContent = '已锁定识别图';
        document.getElementById('ar-hint').textContent = '模型已锚定 ✓';
        document.querySelector('.ar-status .dot').style.background = '#3b82f6';
      });

      scene.addEventListener('targetLost', () => {
        foundTarget = false;
        document.getElementById('ar-status-text').textContent = '扫描识别图中...';
        document.getElementById('ar-hint').textContent = '请将摄像头对准识别图';
        document.querySelector('.ar-status .dot').style.background = '#00d4aa';
      });

      // Hide loading when scene is ready
      scene.addEventListener('loaded', () => {
        document.getElementById('loading').classList.add('hidden');
      });

      // Fallback: hide loading after 5s
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 5000);
    }

    function stopAR() {
      if (arScene) {
        arScene.parentNode.removeChild(arScene);
        arScene = null;
      }
      document.getElementById('ar-scene').style.display = 'none';
      document.getElementById('landing').style.display = 'flex';
      document.getElementById('loading').classList.remove('hidden');
      foundTarget = false;
      document.getElementById('ar-status-text').textContent = '扫描识别图中...';
      document.getElementById('ar-hint').textContent = '请将摄像头对准识别图';
      document.querySelector('.ar-status .dot').style.background = '#00d4aa';
    }
  </script>
</body>
</html>
